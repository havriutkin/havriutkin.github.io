title: Vladyslav Havriutkin
description: Personal site — projects, blog, and more.
author: Vladyslav Havriutkin
email: "vhavriutkin3@gatech.edu"
baseurl: ""
url: "https://havriutkin.github.io"

# Build settings
markdown: kramdown
highlighter: rouge
permlink: /blog/:year/:month/:day/:title/

kramdown:
  math_engine: mathjax

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:name/

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
    values:
      layout: "default"

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - instructions.md
